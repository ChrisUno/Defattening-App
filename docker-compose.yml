services:
  postgres:
    image: postgres:16-alpine
    container_name: defattening-db
    environment:
      POSTGRES_DB: defattening
      POSTGRES_USER: defattening
      POSTGRES_PASSWORD: defattening
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defattening"]
      interval: 3s
      timeout: 3s
      retries: 10

  flyway:
    image: flyway/flyway:11
    container_name: defattening-flyway
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/defattening
      -user=defattening
      -password=defattening
      -connectRetries=5
      migrate
    profiles:
      - migrate

  flyway-seed:
    image: flyway/flyway:11
    container_name: defattening-flyway-seed
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/defattening
      -user=defattening
      -password=defattening
      -connectRetries=5
      -target=latest
      migrate
    profiles:
      - seed

  app:
    build:
      context: .
      args:
        VITE_ENTRA_TENANT_ID: ${VITE_ENTRA_TENANT_ID:-eedd1340-df1a-4db2-8a03-b4cfb1fa3e9d}
        VITE_ENTRA_CLIENT_ID: ${VITE_ENTRA_CLIENT_ID:-08cad655-0f77-4c30-8db4-b206df38d347}
        VITE_ENTRA_API_SCOPE: ${VITE_ENTRA_API_SCOPE:-api://08cad655-0f77-4c30-8db4-b206df38d347/access_as_user}
    container_name: defattening-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: defattening
      DB_USER: defattening
      DB_PASSWORD: defattening
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-eedd1340-df1a-4db2-8a03-b4cfb1fa3e9d}
      ENTRA_API_CLIENT_ID: ${ENTRA_API_CLIENT_ID:-08cad655-0f77-4c30-8db4-b206df38d347}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "3001:3001"
    profiles:
      - deploy

volumes:
  pgdata:
